server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # 用户服务路由
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0

        # AI 服务路由
        - id: ai-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=0

      # 全局 CORS 配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      # 默认过滤器
      default-filters:
        - AddResponseHeader=X-Gateway-Version, 1.0.0
        - AddResponseHeader=X-Powered-By, DBY-Gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.dby.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
